name: Deploy to Prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Prod VM
        env:
          SSH_KEY: ${{ secrets.SSH_KEY_PROD }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          scp -i key.pem -o StrictHostKeyChecking=no -r \
            bot.mjs web.mjs panel.html package.json package-lock.json lib scripts \
            ubuntu@146.181.44.27:~/music-bot/
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@146.181.44.27 "\
            echo 'Node en la VM:'; node -v; \
            sudo systemctl restart music-bot; \
            sudo systemctl restart music-web || echo 'music-web aún no configurado (Fase 3)'"
          rm key.pem

      - name: Verify services are running
        env:
          SSH_KEY: ${{ secrets.SSH_KEY_PROD }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          sleep 5
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@146.181.44.27 "\
            echo '== music-bot =='; journalctl -u music-bot -n 5 --no-pager; \
            echo '== music-web =='; journalctl -u music-web -n 5 --no-pager || echo 'music-web aún no configurado'"
          rm key.pem
