name: Deploy to Test

on:
  push:
    branches: [test]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Test VM
        env:
          SSH_KEY: ${{ secrets.SSH_KEY_TEST }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          scp -i key.pem -o StrictHostKeyChecking=no bot.mjs panel.html package.json ubuntu@144.22.62.84:~/
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@144.22.62.84 "sudo systemctl restart music-bot"
          rm key.pem

      - name: Verify bot is running
        env:
          SSH_KEY: ${{ secrets.SSH_KEY_TEST }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          sleep 5
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@144.22.62.84 "journalctl -u music-bot -n 5 --no-pager"
          rm key.pem
