name: Deploy to Test

on:
  push:
    branches: [test]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Test VM
        env:
          SSH_KEY: ${{ secrets.SSH_KEY_TEST }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          scp -i key.pem -o StrictHostKeyChecking=no -r \
            bot.mjs web.mjs panel.html package.json package-lock.json lib scripts Asher_logo.jpg Asher_icon.jpg \
            ubuntu@144.22.62.84:~/
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@144.22.62.84 "\
            echo 'Node en la VM:'; node -v; \
            grep -q '^COOKIE_PREFIX=' ~/.env || echo 'COOKIE_PREFIX=test_' >> ~/.env; \
            sudo systemctl restart music-bot; \
            sudo systemctl restart music-web || echo 'music-web aún no configurado (Fase 3)'"
          rm key.pem

      - name: Verify services are running
        env:
          SSH_KEY: ${{ secrets.SSH_KEY_TEST }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          sleep 5
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@144.22.62.84 "\
            echo '== music-bot =='; journalctl -u music-bot -n 5 --no-pager; \
            echo '== music-web =='; journalctl -u music-web -n 5 --no-pager || echo 'music-web aún no configurado'"
          rm key.pem

      - name: Build Cloudflare Pages (test)
        env:
          BOT_BASE: https://bot-test.aronne.dev
          WEB_BASE: https://web-test.aronne.dev
        run: node scripts/build-pages.mjs

      - name: Deploy to Cloudflare Pages (test)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy dist-pages --project-name=asher-test
